name: Pipeline CI/CD - DevOps

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ✅ ETAPA 1 - Verificar se o index.html existe
  test:
    name: Verificar arquivos do projeto
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Verificar se index.html existe
        run: |
          echo "🔍 Verificando se index.html existe..."
          if [ -f "index.html" ]; then
            echo "✅ index.html encontrado!"
          else
            echo "❌ index.html NÃO encontrado!"
            exit 1
          fi

      - name: Verificar se style.css existe
        run: |
          if [ -f "style.css" ]; then
            echo "✅ style.css encontrado!"
          else
            echo "⚠️ style.css não encontrado."
          fi

      - name: Verificar se script.js existe
        run: |
          if [ -f "script.js" ]; then
            echo "✅ script.js encontrado!"
          else
            echo "⚠️ script.js não encontrado."
          fi

  # 🚀 ETAPA 2 - Deploy na Vercel (só roda se os testes passarem)
  deploy:
    name: Deploy na Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Deploy para Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'