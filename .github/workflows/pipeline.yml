name: Pipeline CI /CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # Verifica se o arquivo index.html existe
  test:
    name: Verificar arquivos do projeto 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Verificar se o arquivo index.html existe
        run: |
          echo 'Verificando se o arquivo index.html existe...'
          if [ -f "index.html" ]; then
            echo "O arquivo index.html existe."
          else
            echo "O arquivo index.html não existe."
            exit 1
          fi
      - name: Verificar se o arquivo style.css existe
        run: |
          echo 'Verificando se o arquivo style.css existe...'
          if [ -f "style.css" ]; then
            echo "O arquivo style.css existe."
          else
            echo "O arquivo style.css não existe."
            exit 1
          fi
      - name: Verificar se o arquivo script.js existe
        run: |
          echo 'Verificando se o arquivo script.js existe...'
          if [ -f "script.js" ]; then
            echo "O arquivo script.js existe."
          else
            echo "O arquivo script.js não existe."
            exit 1
          fi

  deploy:
    name: Deploy na Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Deploy para Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel_args: '--prod'