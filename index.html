<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Tools</title>
</head>
<body>

    <header>
        <img src="https://atendimento.unipar.br/static/img/logouni2.png" alt="Logo do Projeto" class="logo">

    <h1>Sistema de Cadastro Acadêmico</h1>
    <h3>Atividade 1</h3>

    <main class="container">
        <section class="formulário">

            <h2>Dados do Estudante</h2>
            <form id="cadastroForm">
                <div class="input-group">
                <label for="nome">Nome: </label>
                <input type="text"
                id="nome" placeholder="Digite seu nome">
                </div>

                <div class="input-group">
                <label for="idade">Idade: </label>
                <input type="number"
                id="idade" placeholder="Digite sua idade">
                </div>

            </form>

        </section>

    </main>



    </header>
    
</body>
</html>
