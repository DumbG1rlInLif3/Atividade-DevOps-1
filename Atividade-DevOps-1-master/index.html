<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Tools</title>
  </head>
  <body>
    <header>
      <img
        src="https://atendimento.unipar.br/static/img/logouni2.png"
        alt="Logo do Projeto"
        class="logo"
      />

      <h1>Sistema de Cadastro Acadêmico</h1>

      <main class="container">
        <section class="formulário">
          <h2>Dados do Estudante</h2>
          <form id="cadastroForm">
            <div class="input-group">
              <label for="nome">Nome: </label>
              <input type="text" id="nome" placeholder="Digite seu nome" />
            </div>

            <div class="input-group">
              <label for="idade">Idade: </label>
              <input type="number" id="idade" placeholder="Digite sua idade" />
            </div>

            <div class="input-group">
              <label for="curso">Curso: </label>
              <input type="text" id="curso" placeholder="Ex:ADS" />
            </div>

            <button type="button" onclick="atualizarDados()">Visualizar</button>
          </form>
        </section>

        <section class="box visualização">
          <h2>Informações Digitadas</h2>

          <div id="resultado">
            <p><strong>Nome: </strong> <span id="resNome">. . .</span></p>
            <p><strong>Idade: </strong> <span id="resIdade">. . .</span></p>
            <p><strong>Curso: </strong> <span id="resCurso">. . .</span></p>
          </div>
        </section>
      </main>
    </header>
    <script src="script.js"></script>
  </body>
</html>
